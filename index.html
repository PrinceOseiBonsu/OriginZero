<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OriginZero</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Georgia, serif; background: #F5F0E8; color: #2C2C2A; }
    header { background: #2C2C2A; color: #F5F0E8; padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 24px; letter-spacing: 1px; }
    header p { font-size: 13px; opacity: 0.6; }
    .search-bar { display: flex; gap: 10px; padding: 1.2rem 2rem 0.8rem; background: #EDE8DC; border-bottom: 1px solid #D3D1C7; flex-wrap: wrap; }
    .search-bar input { flex: 1; padding: 10px 14px; border-radius: 6px; border: 1px solid #D3D1C7; font-size: 14px; background: #fff; min-width: 200px; }
    .search-bar button { padding: 10px 20px; background: #2C2C2A; color: #fff; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
    .search-bar button:hover { background: #444; }
    .chips { display: flex; gap: 8px; padding: 0.7rem 2rem 1rem; background: #EDE8DC; flex-wrap: wrap; border-bottom: 1px solid #D3D1C7; }
    .chip { padding: 5px 14px; border-radius: 20px; border: 1px solid #2C2C2A; font-size: 12px; cursor: pointer; background: #fff; color: #2C2C2A; }
    .chip:hover { background: #2C2C2A; color: #fff; }
    .chip.active { background: #2C2C2A; color: #fff; }
    .main { display: grid; grid-template-columns: 1fr 1fr; gap: 0; min-height: calc(100vh - 160px); }
    .graph-panel { border-right: 1px solid #D3D1C7; padding: 1.5rem; }
    .panel-title { font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.1em; color: #888; margin-bottom: 1rem; }
    #graph-container { width: 100%; height: 450px; background: #fff; border-radius: 8px; border: 1px solid #D3D1C7; overflow: hidden; }
    .narrative-panel { padding: 1.5rem; overflow-y: auto; }
    .origin-chain { margin-bottom: 1.5rem; }
    .chain-item { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 12px; }
    .chain-number { width: 28px; height: 28px; border-radius: 50%; background: #2C2C2A; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
    .chain-text { font-size: 13px; color: #2C2C2A; line-height: 1.5; padding-top: 4px; }
    .chain-name { font-weight: bold; }
    .chain-score { font-size: 11px; color: #888; }
    .narrative-box { background: #fff; border-radius: 8px; border: 1px solid #D3D1C7; padding: 1.2rem; }
    .narrative-box p { font-size: 13px; line-height: 1.8; color: #3a3028; font-style: italic; }
  </style>
</head>
<body>

<header>
  <h1>OriginZero</h1>
  <p>Tracing the root causes of health disparities through Wikipedia</p>
</header>

<div class="search-bar">
  <input id="search" type="text" placeholder="Select a topic below..." readonly />
  <button onclick="loadData()">Trace Origin</button>
</div>

<div class="chips">
  <span class="chip active" onclick="selectTopic('diabetes')">Type 2 Diabetes</span>
  <span class="chip" onclick="selectTopic('maternal')">Maternal Mortality</span>
  <span class="chip" onclick="selectTopic('obesity')">Childhood Obesity</span>
</div>

<div class="main">
  <div class="graph-panel">
    <div class="panel-title">Knowledge Graph</div>
    <div id="graph-container"></div>
  </div>

  <div class="narrative-panel">
    <div class="panel-title">Origin Chain</div>
    <div class="origin-chain" id="origin-chain"></div>
    <div class="panel-title">AI Narrative</div>
    <div class="narrative-box">
      <p id="narrative-text">Select a topic and click Trace Origin...</p>
    </div>
  </div>
</div>

<script>
const TOPICS = {
  diabetes: {
    label: "Type 2 Diabetes",
    chain: [
      { rank: 1, node: "African-American history", score: 0.0497 },
      { rank: 2, node: "Diet (nutrition)", score: 0.0485 },
      { rank: 3, node: "African Americans", score: 0.0482 },
      { rank: 4, node: "African-American diaspora", score: 0.0464 },
      { rank: 5, node: "Healthy diet", score: 0.0387 },
      { rank: 6, node: "Childhood obesity", score: 0.0248 },
      { rank: 7, node: "History of diabetes", score: 0.0217 },
      { rank: 8, node: "Nutrition", score: 0.0201 },
      { rank: 9, node: "Obesity", score: 0.0189 },
      { rank: 10, node: "Community health", score: 0.0175 }
    ],
    narrative: "The disproportionate impact of Type 2 diabetes on African American and underrepresented communities has its roots in centuries of historical, social, and economic injustices. The transatlantic slave trade and subsequent segregation forced African Americans into poverty, limiting access to healthy food, safe living conditions, and quality healthcare. The legacy of these disparities persists, with many communities of color facing food deserts, inadequate nutrition, and restricted opportunities for physical activity. Systemic inequalities, such as discriminatory housing and employment practices, have created a perfect storm of risk factors. Change requires acknowledging and dismantling the social and economic barriers that have led to this crisis."
  },
  maternal: {
    label: "Maternal Mortality",
    chain: [
      { rank: 1, node: "Racism in the United States", score: 0.0521 },
      { rank: 2, node: "African-American history", score: 0.0498 },
      { rank: 3, node: "Maternal death", score: 0.0461 },
      { rank: 4, node: "Health disparities", score: 0.0443 },
      { rank: 5, node: "Poverty in the United States", score: 0.0398 },
      { rank: 6, node: "Implicit bias", score: 0.0351 },
      { rank: 7, node: "Prenatal care", score: 0.0312 },
      { rank: 8, node: "Segregation", score: 0.0287 },
      { rank: 9, node: "Income inequality", score: 0.0241 },
      { rank: 10, node: "Medical discrimination", score: 0.0198 }
    ],
    narrative: "Black women in the United States die in childbirth at three times the rate of white women — a crisis rooted not in biology but in history. Centuries of racism, from medical experimentation on enslaved women to systematic exclusion from quality healthcare, created a system that consistently undervalues Black women's pain and health concerns. Poverty, segregation, and implicit bias in medical settings compound this legacy, leaving Black mothers vulnerable at the moment they need care most. OriginZero traces this crisis back through Wikipedia to its true origins — policy failures and systemic racism, not personal circumstance."
  },
  obesity: {
    label: "Childhood Obesity",
    chain: [
      { rank: 1, node: "Food desert", score: 0.0534 },
      { rank: 2, node: "Poverty in the United States", score: 0.0498 },
      { rank: 3, node: "Redlining", score: 0.0467 },
      { rank: 4, node: "African-American history", score: 0.0441 },
      { rank: 5, node: "Nutrition", score: 0.0389 },
      { rank: 6, node: "Fast food", score: 0.0342 },
      { rank: 7, node: "Income inequality", score: 0.0298 },
      { rank: 8, node: "Urban disinvestment", score: 0.0261 },
      { rank: 9, node: "School nutrition", score: 0.0224 },
      { rank: 10, node: "Community health", score: 0.0187 }
    ],
    narrative: "Childhood obesity in underrepresented communities is not a failure of individual families — it is the predictable result of decades of deliberate policy. Redlining in the 1930s locked minority families out of wealthy neighborhoods, concentrating poverty in areas that would later become food deserts. Without supermarkets, without safe spaces to exercise, and without economic resources to choose healthier options, generations of children grew up in environments designed to make healthy living impossible. OriginZero traces childhood obesity back through Wikipedia to its true origin — government policy, not personal choice."
  }
};

let currentTopic = "diabetes";

function selectTopic(topic) {
  currentTopic = topic;
  document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
  event.target.classList.add("active");
  document.getElementById("search").value = TOPICS[topic].label;
  loadData();
}

function loadData() {
  const data = TOPICS[currentTopic];
  renderChain(data.chain);
  renderNarrative(data.narrative);
  renderGraph(data.chain);
}

function renderChain(chain) {
  const container = document.getElementById("origin-chain");
  container.innerHTML = chain.map(item => `
    <div class="chain-item">
      <div class="chain-number">${item.rank}</div>
      <div class="chain-text">
        <div class="chain-name">${item.node}</div>
        <div class="chain-score">Influence score: ${item.score}</div>
      </div>
    </div>
  `).join("");
}

function renderNarrative(narrative) {
  document.getElementById("narrative-text").textContent = narrative;
}

function renderGraph(chain) {
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  const width = container.offsetWidth;
  const height = container.offsetHeight;

  const svg = d3.select("#graph-container")
    .append("svg")
    .attr("width", width)
    .attr("height", height);

  const nodes = chain.map(d => ({ id: d.node, score: d.score }));
  const links = chain.slice(1).map((d, i) => ({ source: chain[i].node, target: d.node }));

  const simulation = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(links).id(d => d.id).distance(80))
    .force("charge", d3.forceManyBody().strength(-200))
    .force("center", d3.forceCenter(width / 2, height / 2));

  const link = svg.append("g")
    .selectAll("line")
    .data(links)
    .join("line")
    .attr("stroke", "#D3D1C7")
    .attr("stroke-width", 1.5);

  const node = svg.append("g")
    .selectAll("circle")
    .data(nodes)
    .join("circle")
    .attr("r", d => 8 + d.score * 200)
    .attr("fill", "#2C2C2A")
    .attr("stroke", "#F5F0E8")
    .attr("stroke-width", 2)
    .call(d3.drag()
      .on("start", dragstarted)
      .on("drag", dragged)
      .on("end", dragended));

  const label = svg.append("g")
    .selectAll("text")
    .data(nodes)
    .join("text")
    .text(d => d.id)
    .attr("font-size", 10)
    .attr("fill", "#2C2C2A")
    .attr("text-anchor", "middle")
    .attr("dy", d => -(8 + d.score * 200) - 4);

  simulation.on("tick", () => {
    link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
    node.attr("cx", d => d.x).attr("cy", d => d.y);
    label.attr("x", d => d.x).attr("y", d => d.y);
  });

  function dragstarted(event, d) {
    if (!event.active) simulation.alphaTarget(0.3).restart();
    d.fx = d.x; d.fy = d.y;
  }
  function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
  function dragended(event, d) {
    if (!event.active) simulation.alphaTarget(0);
    d.fx = null; d.fy = null;
  }
}

selectTopic("diabetes");
</script>
</body>
</html>
